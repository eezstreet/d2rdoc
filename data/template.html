<!DOCTYPE html>
<html lang=en>
<head>
    <meta charset="utf-8">
    <title><##> - Diablo II: Resurrected Data Guide</title>
    <link rel="icon" type="image/x-icon" href="../media/diabloii.ico"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <meta name="description" content="Documentation for <##> in Diablo II: Resurrected data files. Field names, types, descriptions, and modding tutorials for D2R.">
    <meta property="og:title" content="<##> - Diablo II: Resurrected Data Guide">
    <meta property="og:description" content="Documentation for <##> in Diablo II: Resurrected data files. Field names, types, descriptions, and modding tutorials for D2R.">
    <meta property="og:type" content="article">
    <link rel="canonical" href="<@@>.html">
    <link rel="stylesheet" href="../style/main.css" />
    <link rel="stylesheet" href="../style/file.css" />
</head>
<body>
    <template id="field-template">
        <div class="field page-sidebar-target">
            <div class="field-alt-name-targets"></div>
            <div class="field-rows">
                <div class="field-row">
                    <div class="field-label">
                        <a class="field-name" href=""><h3>Name</h3></a>
                        <div class="field-type">
                            <span class="field-type-text"></span>
                            <span class="field-type-tooltip-icon">
                                &#9432
                                <span class="field-type-tooltip-text"></span>
                            </span>
                        </div>
                    </div>
                    <div class="field-alt-names"></div>
                </div>
                <div class="field-divider"></div>
                <div class="field-row">
                    <div class="field-description"></div>
                    <table class="field-table">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                    <div class="field-appendfield"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="json-field-template">
        <div>
            <div class="json-field"></div>
            <div class="json-divider">
                <div class="json-properties"></div>
            </div>
        </div>
    </template>

    <template id="appendfield-template">
        <details>
            <summary class="appendfield-summary"></summary>
            <div class="field-description"></div>
            <table class="field-table">
                <thead></thead>
                <tbody></tbody>
            </table>
        </details>
    </template>

    <template id="file-template">
        <h1 class="file-title"></h1>
        <div class="file-overview"></div>
        <br>
        <div class="file-fields"></div>
    </template>

    <div id="page">
        <nav id="site-sidebar" class="sidebar">
            <label id="site-hamburger" class="hamburger">
                <input type="checkbox"></input>
            </label>
        </nav>
        <div class="content">
            <div id="file-content">
                <noscript><&&></noscript>
            </div>
            <footer>
                This is a community project and not affiliated with Blizzard Entertainment. Want to contribute? Check it out on <a href="https://github.com/eezstreet/d2rdoc">GitHub!</a>
            </footer>
        </div>
        <nav id="page-sidebar" class="sidebar">
            <label id="page-hamburger" class="hamburger">
                <input type="checkbox"></input>
            </label>
            <div id="version-switcher-container"></div>
        </nav>
    </div>

    <script>
        var files = {};
    </script>
    <script src="../data/siteindex.js"></script>
    <script src="../data/search.js"></script>
    <script src="../script/sitesidebar.js"></script>
    <script src="../data/schemas.js"></script>
    <script src="../data/files/<@@>.js"></script>
    <$$>
    <script src="../data/community-notes.js"></script>
    <script src="../script/file.js"></script>
    <script src="../script/version-switcher.js"></script>
    <script>
        var currentFileKey = "<@@>";
        populateSiteSidebar("..", siteIndex);
        initVersionSwitcher("..", currentFileKey, function() {
            populateFile(files[currentFileKey]);
            populatePageSidebar(files[currentFileKey]);
            fixupPageSidebar();
        });
    </script>


</body>
</html>
